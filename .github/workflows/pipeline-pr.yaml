name: Pipeline - PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: write
  pull-requests: write

jobs:

  semgrep:
    if: github.actor != 'dependabot[bot]'
    name: semgrep/pr
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
    ## Non-blocking
    # continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          # Shallow clone for speed
          fetch-depth: 1

      # Semgrep CI auto-detects PR context and posts findings as PR comments
      - name: Semgrep diff scan (SAST only)
        run: semgrep ci

