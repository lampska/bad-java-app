name: Pipeline - PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: write


jobs:

  semgrep:
    if: github.actor != 'dependabot[bot]'
    name: semgrep/pr
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
    ## Non-blocking
    # continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          # Shallow clone for speed
          fetch-depth: 1

      # Semgrep CI auto-detects PR context and posts findings as PR comments
      - name: Semgrep diff scan (SAST only)
        run: semgrep ci

  compile:
    needs: semgrep
    if: github.actor != 'dependabot[bot]'
    name: maven/compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # with:
        #   fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # Compile only
      - name: Compile
        run: mvn --batch-mode compile

      # Pass compiled classes to test job. Avoids recompiling on fresh runner
      - name: Upload compiled classes
        uses: actions/upload-artifact@v4
        with:
          name: compiled-classes
          path: target/classes
          retention-days: 1

